<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/main.js" defer></script>
  <link rel="stylesheet" href="css/styles.css">
  <title>Example SaaS Page</title>
</head>
<body>
  <div class="container">
    <nav>
      <img src="images/sassify.png" alt="Logo" class="logo">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#" class="nav-cta">Contact</a></li>
      </ul>
    </nav>
  </div>
  <!-- Hero Section -->
  <section class="hero">
    <div class="container hero__inner">

      <!-- LEFT: Text Content -->
      <div class="hero__text">
        <h1 class="hero__headline">Ship Faster, Scale Smarter</h1>
        <p class="hero__subheadline">
          The all-in-one SaaS platform that helps your team move from idea to launch — without the chaos.
        </p>
        <div class="hero__ctas">
          <button class="btn btn--primary">Get Started Free</button>
          <button class="btn btn--secondary">See How It Works</button>
        </div>
      </div>

      <!-- RIGHT: Hero Illustration -->
      <div class="hero__image">
        <img src="images/hero-illustration.svg" alt="Product dashboard illustration">
      </div>

    </div>
  </section>
</body>
</html>
